services:
  telegram-bridge:
    build: .
    image: nopenix/telegram-bridge-openwebui:latest
    container_name: owui-telegram-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # If Open WebUI runs on the host (not in a sibling container),
      # host.docker.internal reaches it from inside the container.
      # On Linux you may need to add: extra_hosts: ["host.docker.internal:host-gateway"]
      OPENWEBUI_BASE_URL: ${OPENWEBUI_BASE_URL:-http://host.docker.internal:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Health endpoint — bound to all interfaces so Docker healthcheck (which runs
      # *inside* the container's network namespace via `docker inspect`) works.
      # Safe to expose externally too: it's read-only and returns just the model name.
      - "8088:8088"
      # /api/outbound — bound to 127.0.0.1 INSIDE the container by default.
      # The OWUI tool runs in Open WebUI (sibling container or host), so it can
      # reach this on host.docker.internal:8089. Do NOT expose 8089 to the host.
      # If you need to expose it (e.g. OWUI is on a different host), set
      # OUTBOUND_LISTEN=0.0.0.0 and add a port mapping + bearer token.
    volumes:
      # Persist chat sessions and the outbound message map across container restarts
      - ./data:/app/data
    healthcheck:
      # Real OWUI reachability probe — not just env-var presence
      test:
        - CMD-SHELL
        - "python -c \"import os, httpx, sys; r = httpx.get(os.environ['OPENWEBUI_BASE_URL'] + '/api/models', headers={'Authorization': 'Bearer ' + os.environ['OPENWEBUI_API_KEY']}, timeout=5); sys.exit(0 if r.status_code == 200 else 1)\""
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s